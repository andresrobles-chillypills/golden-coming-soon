<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin – Golden Peach</title>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Instrument Sans', sans-serif;
            background: #fdf8f3;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        }
        h1 { font-size: 1.2rem; font-weight: 600; margin-bottom: 24px; color: #1a1a1a; }
        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e0d8d0;
            border-radius: 10px;
            font-family: inherit;
            font-size: 0.95rem;
            outline: none;
            margin-bottom: 12px;
        }
        input:focus { border-color: #c8a96e; }
        button {
            width: 100%;
            padding: 12px;
            background: #c8a96e;
            color: white;
            border: none;
            border-radius: 10px;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover { background: #b8945a; }
        .error { color: #c0392b; font-size: 0.85rem; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Descargar suscriptores</h1>
        <input type="password" id="secret" placeholder="Clave secreta" />
        <button onclick="descargar()">Descargar CSV</button>
        <div class="error" id="error"></div>
    </div>
    <script>
        async function descargar() {
            const secret = document.getElementById('secret').value.trim();
            const errorEl = document.getElementById('error');
            errorEl.textContent = '';

            if (!secret) { errorEl.textContent = 'Introduce la clave.'; return; }

            const res = await fetch('/admin/subscribers', {
                headers: { 'x-admin-secret': secret }
            });

            if (res.status === 401) { errorEl.textContent = 'Clave incorrecta.'; return; }

            const blob = await res.blob();
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'suscriptores-golden.csv';
            a.click();
            URL.revokeObjectURL(url);
        }

        document.getElementById('secret').addEventListener('keydown', e => {
            if (e.key === 'Enter') descargar();
        });
    </script>
</body>
</html>
